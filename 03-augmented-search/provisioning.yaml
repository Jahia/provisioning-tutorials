# For more details about the provisioning API, you can refer to the Academy: https://academy.jahia.com/documentation/jahia-cms/jahia-8.2/dev-ops/provisioning/about-provisioning

# Start with the provisioning script from Tutorial #2
- include: https://raw.githubusercontent.com/Jahia/provisioning-tutorials/main/02-luxe-mariadb/provisioning.yaml

# Augmented-Search dependencies are only available from Jahia store
# So we're adding a new repository to be able to resolve these dependencies
- addMavenRepository: "https://devtools.jahia.com/nexus/content/repositories/jahia-public-app-store/@id=JahiaStore"

# Install and start Modules for Augmented Search
- installModule:
    - "mvn:org.jahia.modules/augmented-search/4.0.0"
    - "mvn:org.jahia.modules/augmented-search-ui/4.0.0"
    - "mvn:org.jahia.modules/elasticsearch-connector/4.0.1"
  autoStart: true
  uninstallPreviousVersion: true

# Configure Connection to Elasticsearch
- editConfiguration: "org.jahia.modules.elasticsearchConnector"
  properties:
    elasticsearchConnector.host: "elasticsearch"
    elasticsearchConnector.port: "9200"
    elasticsearchConnector.user: "elastic"
    elasticsearchConnector.password: "8gFk4F7r3nRz+yHBf7i+/oeEdHoPU0S8" # Encrypted version of "password" (see docker-compose.yml)
    elasticsearchConnector.useXPackSecurity: "true"
    elasticsearchConnector.useEncryption: "false"
    elasticsearchConnector.additionalHostAddresses[0]: "elasticsearch:9210"

# Enable Augmented Search sample UI on Luxe
- enable: "augmented-search-ui"
  site: "luxe"

# Configure Augmented Search and Luxe and start indexation
- executeScript: "https://raw.githubusercontent.com/Jahia/provisioning-tutorials/main/03-augmented-search/as-add-luxe.graphql"
- executeScript: "https://raw.githubusercontent.com/Jahia/provisioning-tutorials/main/03-augmented-search/as-index-luxe.graphql"

# Create a new menu entry in Luxe and add Augmented Search UI
- executeScript: "https://raw.githubusercontent.com/Jahia/provisioning-tutorials/main/03-augmented-search/asui-add-page.graphql"
- executeScript: "https://raw.githubusercontent.com/Jahia/provisioning-tutorials/main/03-augmented-search/asui-add-node.graphql"
- executeScript: "https://raw.githubusercontent.com/Jahia/provisioning-tutorials/main/03-augmented-search/asui-publish-page.graphql"
- executeScript: "https://raw.githubusercontent.com/Jahia/provisioning-tutorials/main/03-augmented-search/asui-publish-node.graphql"
